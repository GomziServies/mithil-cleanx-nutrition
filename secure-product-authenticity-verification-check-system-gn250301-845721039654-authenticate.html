<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Authentication | Cleanx Nutrition</title>
	<link rel="icon" type="image/png" href="images/fevicon.png">
	<link rel="stylesheet" href="css/bootstrap.css">
	<link rel="stylesheet" href="css/font-awesome.min.css">
	<link rel="stylesheet" href="css/poppins.css">
	<link rel="stylesheet" href="css/authentication.css">
</head>

<body class="auth-page-body">
	<main class="auth-section">
		<div class="auth-glow auth-glow--left"></div>
		<div class="auth-glow auth-glow--right"></div>

		<div class="container">
			<section class="auth-card is-loading" id="auth-card">
				<a class="auth-logo" href="index.html" aria-label="Cleanx Nutrition Home">
					<img src="images/Untitled-1-Photoroom.png" alt="Cleanx Nutrition">
				</a>

				<span class="auth-kicker">100% Genuine Product Verification</span>

				<div class="auth-visual-wrap">
					<div class="auth-verifying-visual">
						<div class="auth-ring"></div>
						<div class="auth-ring auth-ring--inner"></div>

						<div class="auth-qr-box">
							<div class="auth-qr-pattern" aria-hidden="true">
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
								<span></span>
							</div>
							<div class="auth-scan-line"></div>
							<div class="auth-qr-frame auth-qr-frame--one"></div>
							<div class="auth-qr-frame auth-qr-frame--two"></div>
						</div>
					</div>

					<div class="auth-badge" id="auth-badge">
						<i class="fa fa-check-circle"></i>
						<span>VERIFIED</span>
					</div>
				</div>

				<div class="auth-copy">
					<h1 id="auth-heading">Verifying product authentication</h1>
					<p class="auth-status" id="auth-status">Scanning QR code...</p>
					<div class="auth-result" id="auth-result">
						<p class="auth-message" id="auth-message">Your product is <span>100% authentic</span>.</p>
						<p class="auth-submessage">This product has been successfully matched with Cleanx Nutrition quality records.</p>
					</div>
				</div>
			</section>
		</div>
	</main>

	<script src="js/authentication.js"></script>
</body>

</html>
